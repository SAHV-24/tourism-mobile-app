version: '3.8'

services:
  backend:
    image: sergioherrera24/mobile-backend:2
    container_name: tourism-backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - MONGO_ATLAS_URI=${MONGO_ATLAS_URI}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}  
    env_file:
      - ./.env
    networks:
      - tourism-network
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
    container_name: tourism-frontend
    ports:
      - "4200:4200"
    environment:
      - NODE_ENV=development
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - tourism-network
    restart: unless-stopped

networks:
  tourism-network:
    driver: bridge
